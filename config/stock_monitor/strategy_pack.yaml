market_framework:
  current_stage: "情绪拐点确认期 + 调整是更好确定点"
  core_question: "明日调整是否不创新低？能否裂变出聚焦主线？规避半导体和消费，关注CPU自研链、上游涨价链、液冷/SST。"
  latest_up_bias:
    source_docs:
      - "sources/raw/财经/复盘：26-05-28：连续杀跌后的情绪共振拐点.md"
      - "sources/raw/财经/动态：26-05-28：尾盘仓位建议与明日策略.md"
      - "sources/raw/财经/动态：26-05-28：4050支撑确认与情绪拐点.md"
      - "sources/raw/财经/动态：26-05-28：大级别调整未完，等美股黄金坑.md"
    rules:
      - "5月28日V型修复定性为'情绪拐点'而非'主升确认'，是连续杀跌后的阳线共振。"
      - "拐点验证两个条件：①明后天分歧时全A不能破位（4055底线）；②必须出现聚焦主线，否则只有宽度没有高度。"
      - "明日可能调整，但调整是更好确定点——不创新低=底部确认=加仓。"
      - "仓位建议：空仓→5成左右，满仓→降仓留空间。"
      - "规避方向：半导体（博主置顶'不要买半导体'）、消费/白酒（过渡性质确认）。"
      - "新催化优先级：CPU自研链（字节自研CPU→Socket+PCIe Switch）> 上游涨价链（功率半导体→高频变压器→SST）> 液冷/散热（华为韬定律）> 算力租赁/token工厂。"
      - "高位品种（CPO）提供确认而非空间，不追高。"
      - "节奏预判：明天延续普涨 → 下周一开始分化 → 主线明确，大概率从科技内部出分支。"
  index_rules:
    - name: "4055_support"
      index: "上证指数"
      trigger_condition: "close_below"
      threshold: 4055
      severity: "risk"
      action: "拐点失效观察"
      trigger_template: "收盘跌破{threshold}"
      interpretation: "4055是今日低点，也是拐点有效性底线。跌破=拐点失效，回归5月22日杀跌剧本。"

    - name: "weak_repair_alert"
      index: "上证指数"
      trigger_condition: "close_below"
      threshold: 4080
      severity: "observe"
      action: "指数弱修复观察"
      trigger_template: "收盘跌破{threshold}"
      interpretation: "修复力度不足，降低次日预期，持仓以持有观察为主不新增净仓。"

    - name: "trend_defense_proximity"
      index: "上证指数"
      trigger_condition: "close_below"
      threshold: 4070
      severity: "risk"
      action: "指数趋势防线观察"
      trigger_template: "收盘跌破{threshold}"
      interpretation: "弱修复确认，触发持仓保护观察，核心票跌破分时均价优先T出或减亏。"

    - name: "4000_support"
      index: "上证指数"
      trigger_condition: "close_below"
      threshold: 4000
      severity: "risk"
      action: "4000点支撑跌破"
      trigger_template: "收盘跌破{threshold}"
      interpretation: "4000点强支撑跌破，调整加深，需重新评估底部位置。"

intraday_schedule:
  - window: "09:15-09:30"
    name: "集合竞价"
    action_bias: "只观察"
    rules:
      - "观察防御股（电力/MLCC）是否再演剧本式高开"
      - "观察CPU自研链（得润/万通）是否超预期高开"
      - "观察上游涨价链（芯碁微装/华虹）是否主动走强"
      - "观察跌停家数是否边际缩短"
      - "不因单票高开直接追买"
  - window: "09:30-09:45"
    name: "开盘观察"
    action_bias: "确认方向"
    rules:
      - "看防御股是否被剧本式拉起，决定日内风格偏进攻还是防守"
      - "看CPU自研链是否主动走强（可能裂变为主线）"
      - "看上游涨价链是否扩散"
      - "看指数是否快速失守4055"
  - window: "09:45-10:30"
    name: "急跌确认"
    action_bias: "等确认，不水下盲吸"
    rules:
      - "若调整不创新低（4055之上），并放量收回分时均线，可进入观察"
      - "若半导体/消费被规避方向虹吸，暂停观察池买入"
      - "只买跌得多且看好的CPU链/涨价链核心，不买破位后排"
  - window: "10:30-13:30"
    name: "主修复窗口"
    action_bias: "可做T，可观察"
    rules:
      - "趋势未破的CPU链/涨价链硬逻辑票，满足分时确认后可观察"
      - "反弹到预设区但板块不扩散，优先观察不介入"
      - "现金为主，新增观察池买点必须等情景确认"
  - window: "13:30-15:00"
    name: "午后风险窗口"
    action_bias: "只看不买"
    rules:
      - "午后冲高无扩散，优先观察不介入"
      - "尾盘回落跌破4055，降低次日预期"
      - "若尾盘再度快速修复但成交不能放大，警惕继续透支次日预期"

agent_analysis_schedule:
  - id: "open_auction"
    time: "09:26"
    name: "集合竞价后"
    focus: "防御股是否剧本式拉起，CPU自研链/上游涨价链是否超预期，今天偏进攻还是防守。"

  - id: "open_confirm"
    time: "09:45"
    name: "开盘15分钟确认"
    focus: "指数是否失守4055，CPU链/涨价链谁主动，半导体/消费是否如预期走弱，跌停是否缩短。"

  - id: "morning_confirm"
    time: "10:30"
    name: "30分钟确认"
    focus: "调整是否不创新低，修复质量是否成立，CPU链/涨价链能否做T或观察。"

  - id: "noon_review"
    time: "11:20"
    name: "上午收盘前"
    focus: "上午定性为强修复、弱修复、防御切换还是继续分歧。"

  - id: "afternoon_risk"
    time: "13:10"
    name: "午后风险窗口"
    focus: "按午后只看不买纪律，重点观察冲高回落和板块扩散衰竭。"

  - id: "mid_afternoon"
    time: "14:00"
    name: "午盘监控"
    focus: "午后一小时盘面验证：CPU链/涨价链是否触发观察点、是否出现分歧低吸点。只讲当下，不预判尾盘。"

  - id: "tail_condition"
    time: "14:50"
    name: "尾盘条件单"
    focus: "判断是否符合尾盘观察、规避尾盘杀的条件。"

position_rules:
  - id: "empty_position_discipline"
    name: "空仓纪律"
    applies_to: ["all"]
    all_required:
      - "空仓可上5成左右（情绪拐点，不悲观）"
      - "等调整确认不创新低后再加仓"
      - "明日调整是更好确定点"
    forbidden:
      - "情景未明时建新仓"
      - "追高潮"
      - "抢一字"
      - "防御板块追高"
      - "买入半导体/消费（博主明确规避）"

  - id: "full_position_discipline"
    name: "满仓纪律"
    applies_to: ["all"]
    all_required:
      - "满仓应降仓，留操作空间"
      - "外盘风险未释放，给自己明天留够操作空间"
    forbidden:
      - "满仓不动"
      - "追高加仓"

  - id: "liquid_cooling_entry"
    name: "液冷/散热介入确认"
    applies_to:
      - "huawei_cooling_core"
      - "liquid_cooling_cage"
    all_required:
      - "液冷组内联动（飞荣达+鼎通至少两只同步转强）"
      - "个股不是一致高开后的追高点"
      - "分歧后放量收回分时均线"
      - "华为散热逻辑持续发酵"
    forbidden:
      - "发酵日追高"
      - "单票异动但板块不共振"
      - "意华股份走弱拖累组内情绪"
    action: "第一优先级介入"
    position_ratio: "飞荣达2成 + 鼎通1.5成 = 3.5成"

  - id: "price_increase_entry"
    name: "上游涨价链介入确认"
    applies_to:
      - "advanced_packaging_core"
      - "foundry_leader"
      - "supercapacitor_core"
      - "supercapacitor_elastic"
      - "electrode_foil_core"
      - "nanocrystalline_soft_magnetic"
      - "power_semiconductor_core"
      - "gan_power_device"
    all_required:
      - "所属涨价链组强于全A或强于防御组"
      - "个股不是一致高开后的追高点"
      - "分歧后放量收回分时均线"
      - "同组至少一个容量锚同步承接"
    forbidden:
      - "发酵日追高"
      - "单票异动但板块不共振"
      - "华虹/芯碁微装大涨次日直接追"
    action: "第二优先级介入"
    position_ratio: "芯联集成1.5成 + 江海股份1成 = 2.5成"

  - id: "cpu_chain_entry"
    name: "CPU自研链介入确认"
    applies_to:
      - "cpu_socket_core"
      - "pcie_switch_core"
    all_required:
      - "CPU自研链组内联动（得润+万通至少两只同步转强）"
      - "个股不是一致高开后的追高点"
      - "分歧后放量收回分时均线"
      - "字节自研CPU逻辑持续发酵"
      - "ST得润单独控制仓位，严格止损"
    forbidden:
      - "发酵日追高"
      - "单票异动但板块不共振"
      - "ST身份不单独风控"
      - "万通发展涨停次日直接追"
    action: "第三优先级介入（组内分化，降低仓位）"
    position_ratio: "万通发展1成 + ST得润0.5成 = 1.5成"

  - id: "avoid_sector_discipline"
    name: "规避方向纪律"
    applies_to:
      - "avoid_semiconductor"
      - "avoid_consumer"
    all_required:
      - "博主明确规避半导体和消费"
      - "半导体受美股风险影响"
      - "消费/白酒过渡性质确认"
    forbidden:
      - "买入半导体"
      - "买入消费/白酒"
      - "抄底半导体"
    action: "只观察不介入，等博主调整判断后再评估"

