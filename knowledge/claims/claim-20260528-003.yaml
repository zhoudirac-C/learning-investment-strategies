  subject: 低档长红线的判定与信号意义
  timeframe: permanent
  statement: 低档长红线需满足四条件：下跌5-10个交易日、个股跌幅15%/指数5%、涨幅显著的长红线、成交量高于均量为加分项；其本质是大资金入场+卖压释放
  evidence_quote: "低档长红线需要满足四个判定条件：一是前期下跌时间达到5~10个交易日越长越好，二是个股跌幅达到15%、指数跌幅达到5%，三是出现涨幅显著的长红线，四是成交量高于前期平均为加分项不是必须条件。低档长红线等于大资金入场加卖压释放，这是短期底部成立的前提。"
  interpretation: 低档长红线的核心逻辑是供需反转：①长期下跌后卖压耗尽，能割肉的已经离场；②大资金入场吃掉全部卖盘，将价格从最低拉到最高；③四个条件层层递进，时间越长、跌幅越大，信号越可靠；④成交量是加分项而非必须，因为极端低位可能出现"地量见地价"后突然放量。这是短期底部成立的明确买入信号。
