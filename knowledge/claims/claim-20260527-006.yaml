  extracted_at: '2026-05-28'
  claim_type: methodology
  subject: 散户与主力的定位：不博穿越，跟随主力
  timeframe: permanent
  statement: 散户不应博穿越和抄底最低处，这是主力和顶级游资的行为。散户应站在主力角度思考，和主力为伍，做主力的朋友，赚市场给的钱而非情绪的钱
  evidence_quote: 博穿越本质上就跟你想买的最低处和启动点是一个道理，但是最低处和启动点不是我们散户去干的事情，它是属于这种由资本的主力去干的事情...我们散户尽量还是不要去博这种穿越...有缘我们就一起站在主力的角度去做好交易，和主力为伍，做主力的朋友
  interpretation: 核心方法论：①散户能力圈≠主力能力圈，不要模仿游资打板或抄底最低处；②散户的优势是灵活跟随，而非引导情绪；③赚钱的本质是战胜自己的贪婪恐惧，配合正确的节点判断，而非依赖博主或市场。
