    source_date: "2026-05-27"
    source_type: 复盘
    extracted_at: "2026-05-27"
    claim_type: market-cycle
    subject: 回踩定性与周期切换
    timeframe: short-term
    statement: 5月27日的回踩是"等了很久的回踩"，月底切换规律+微盘股下午企稳+高位科技补跌同时发生，大概率是新一轮情绪周期的起点而非崩盘
    evidence_quote: >
      "今天是一次'等了很久的回踩'——指数单边走弱、午后延续调整、短线情绪同步回落。
      从市场结构看，今天大概率是新一轮情绪周期的起点，而非崩盘的开始。"
    interpretation: >
      三个信号同时验证周期切换：①月底切换规律（近几个月周期切换均发生在月底）；
      ②微盘股下午提前企稳（调整最大压制因素解除）；③高位科技尾盘完成补跌（风险释放）。
      这种组合 historically 指向情绪周期切换而非系统性下跌。
    confidence: high
    status: active
