      related_sectors: []

  - id: claim-20260526-025-d
    source_path: sources/raw/财经/视频：26-05-26：股市如何抄底.md
    source_date: "2026-05-26"
    source_type: 视频
    extracted_at: "2026-05-27"
    claim_type: methodology
    subject: 下跌末端微观结构
    timeframe: intraday
    statement: >
      调整末端的典型微观结构：缓跌段→第一波急跌→第二波急跌→直接V起。
      "直接V起"（不磨底）属于超预期强势信号
    evidence_quote: >
      "一般下跌之后，你需要一个缓跌段，它又有一个急跌，又来一波急跌，一波急跌之后，直接就上了。
      这个是属于超预期的情况。"
    interpretation: >
      缓跌段表示空头力量在衰竭但尚未宣泄完毕；第一波急跌是恐慌盘集中杀出；
      第二波急跌是空头最后的宣泄。正常情况下两波急跌后需要横盘磨底，
      若直接V型反弹则说明承接极强，属于超预期强势，可提升对后续反弹质量的预期。
    confidence: high
    status: active
