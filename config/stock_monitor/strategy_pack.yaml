sector_rotation_rules:
  - id: "new_tech_vs_defense"
    name: "新技术分支 vs 防御"
    offensive_groups:
      - "new_tech_branches"
      - "power_sst_chain"
      - "compute_outbound"
    defensive_groups:
      - "defensive_stabilizers"
    min_spread_pct: 1.0
    min_red_ratio_spread: 0.25

  - id: "power_vs_semiconductor_internal"
    name: "科技内部分化：电源/新分支 vs 半导体老主线"
    offensive_groups:
      - "power_sst_chain"
      - "new_tech_branches"
    defensive_groups:
      - "semiconductor_legacy"
    min_spread_pct: 1.5
    min_red_ratio_spread: 0.3

  - id: "mlcc_vs_power_internal"
    name: "MLCC/电源组件 vs 电源/SST链"
    offensive_groups:
      - "mlcc_power_components"
    defensive_groups:
      - "power_sst_chain"
    min_spread_pct: 1.0
    min_red_ratio_spread: 0.2

notification_policy:
  only_notify_when:
    - "新分支触发明确观察点或证伪"
    - "半导体老主线出现领涨矛或封板信号"
    - "大盘或板块状态发生切换"
    - "防御股再演剧本式拉起"
  suppress_when:
    - "只是普通红绿波动"
    - "单票异动但板块不共振"
    - "同一股票同一信号30分钟内已提醒"
    - "当前不在A股交易时段"
  message_fields:
    - "time"
    - "action"
    - "stock"
    - "price"
    - "position_context"
    - "trigger"
    - "market_context"
    - "suggested_plan"
    - "invalidation"
    - "next_check"
