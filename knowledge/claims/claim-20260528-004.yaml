  claim_type: market-cycle
  subject: 连续杀跌后V型修复的拐点定性
  timeframe: short-term
  statement: 连续杀跌后的V型修复是"情绪拐点"而非"主升确认"，应按"右侧第一根"处理，外部冲击下完成拐点是新周期起点概率较大的信号
  evidence_quote: "这是连续杀跌之后的阳线共振，不是趋势中继。从先手视角，它的意义是'情绪拐点'，而不是'主升确认'。把它当拐点对待，意味着仓位与节奏要按'右侧第一根'处理，而非追高。拐点是在美伊冲突再起的背景下完成的。外部冲击下指数仍能下探回升、情绪同步回暖，这种'利空中走强'是新周期起点概率较大的信号。"
  interpretation: 拐点定性的三层判断：①连续杀跌后的阳线共振，意义是情绪拐点而非趋势确认；②修复形态是普涨式轮动而非主线引领，结构性缺失明显；③利空中完成拐点是积极信号，但只是概率判断而非确认。操作上应按右侧第一根处理，不追高，等确认。
  confidence: medium
