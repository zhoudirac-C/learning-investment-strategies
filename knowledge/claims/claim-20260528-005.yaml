  subject: 轻指数重个股的操作思路
  timeframe: short-term
  statement: 当前市场分化巨大，应淡化指数、聚焦个股，专注科技股的打法更适合轻指数重个股
  evidence_quote: "当前市场分化巨大，创业板、科创50等被科技趋势股带动续创新高，而沪指仍在调整，专注科技股的打法更适合淡化指数、聚焦个股。"
  interpretation: 指数分化的应对策略：①沪指仍在日线顶调整周期，但创业板/科创50已创新高；②科技趋势股与指数走势脱节，看指数做个股容易错失机会或误判风险；③"轻指数重个股"的核心是：只要个股所属的科技主线逻辑未破坏、趋势未破位，就淡化指数波动，专注个股节奏。这在结构性行情中是核心生存法则。
