  extracted_at: '2026-05-29'
  claim_type: sector-theme
  subject: AI科技获利回吐而非趋势破坏
  timeframe: short-term
  statement: AI科技内部分歧明显但仍有支撑，真正调整较多的是昨日大涨且强度不高的品种（长电、华天、鹏鼎、生益、中芯），属于正常获利回吐而非趋势破坏
  evidence_quote: 盘面上，AI科技内部分歧明显但并非毫无支撑：光纤等方向下跌后仍有活跃资金进攻，呈现抵抗;真正调整较多的是昨日大涨且强度不高（非强势涨停）的品种，如长电科技、华天科技，PCB的鹏鼎控股、生益科技以及中芯国际，属于正常的获利回吐而非趋势破坏。
  interpretation: 科技调整的性质判断：①有抵抗（光纤等方向仍有资金进攻）= 不是全面撤退；②调整集中在昨日大涨但非强势涨停的品种 = 获利盘兑现，而非逻辑证伪；③长电/华天/鹏鼎/生益/中芯都是前期涨幅较大的核心标的，回调是技术性休整。关键结论：科技仍是核心主线，当前是获利回吐而非趋势破坏。
