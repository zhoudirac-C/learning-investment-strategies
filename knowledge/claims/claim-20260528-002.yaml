- id: claim-20260528-002-e
  source_path: sources/raw/财经/动态：26-05-28：情绪回暖符合预期.md
  source_date: '2026-05-28'
  source_type: 动态
  extracted_at: '2026-05-28'
  claim_type: market-cycle
  subject: 情绪修复日的盘面特征
  timeframe: intraday
  statement: 情绪修复日通常表现为涨跌家数改善、多个科技分支轮动，但缺乏明确的单一主线领涨
  evidence_quote: "今天的行情就是很正常的情绪修复，基本上来能看到涨跌家数的一个改善，但是没有一个明显的主线行情，昨天复盘提到的那些基本都在表现，Mlcc,超级电容，光模块散热，存储基本也都在动"
  interpretation: 情绪修复日的典型特征：①涨跌家数改善（普涨或涨多跌少）；②无明显单一主线，而是前期提到的多个方向同时表现；③科技分支轮动而非集中攻击；④这种"无主线的修复"需要后续1-2个交易日观察是否有领涨方向走出持续性，才能判断修复质量。
  confidence: high
  status: active
