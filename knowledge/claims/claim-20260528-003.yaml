  statement: 没有纪律的技术分析是赌博，有纪律的技术分析才是交易；交易者应把自己当作人形量化，用规则和纪律替代情绪决策
  evidence_quote: "如果没有纪律的技术分析，那么他就是赌博，有纪律的技术分析，它才会是交易。你要把自己当做成一个人形量化，这样你才能够在这个市场上长期的存活下去。"
  interpretation: 技术分析的核心不是形态识别，而是纪律执行：①形态和指标提供的是概率优势，不是确定性；②纪律（止损、仓位管理、目标价执行）将概率优势转化为长期正期望；③"人形量化"意味着用规则替代情绪，用一致性替代随机性；④这是从"赌徒"到"交易者"的根本转变，也是长期存活的前提。
