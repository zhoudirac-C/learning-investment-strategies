  interpretation: 120分钟双顶是中期调整的重要技术信号。博主从上周就开始计划卖出半导体设备，今天双顶确认后执行卖出，说明这是计划内的操作而非临时决定。科创50调整周期4~6天意味着下周下半周才可能迎来新的参与节点。
