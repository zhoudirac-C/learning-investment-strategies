  extracted_at: '2026-05-28'
  claim_type: technical-signal
  subject: 长红线突破箱体的规则
  timeframe: permanent
  statement: 长红线放量突破箱体上沿是明确看多信号，缩量突破是假突破诱多；突破后目标价按箱体高度一比一等长计算
  evidence_quote: "突然放量长红线突破箱体上沿，说明多方取得决定性胜利，新上涨空间打开，是明确看多信号。真突破必须满足放量条件，成交量明显高于盘整期间平均量才是真突破，缩量突破没有资金推动，大概率是假突破，属于诱多信号。突破后上涨目标位按照箱体高度一比一等长计算，箱体高度为箱体上沿价格减下沿价格，目标价等于箱体上沿加箱体高度。"
  interpretation: 箱体突破的完整交易框架：①信号确认：放量长红线突破上沿，成交量是真假突破的关键区分；②目标计算：一倍等长是参考目标，帮助建立离场计划而非精确预测；③持仓管理：到达小目标后若走势强劲可持有到大目标，避免卖飞；④本质：这是"计划交易"的工具，用技术规则约束情绪操作。
