    statement: 指数弱分歧是否良性，取决于核心票跌幅、跌停家数、昨日大长腿是否补跌和量能回流方向
    evidence_quote: >
      "只要回落过程中核心票跌幅不大、跌停家数继续下降、昨日大长腿个股不补跌，就属于良性弱分歧。
      如果早盘冲高后快速跳水，昨日大长腿核心普遍跌超 -3%，同时低位新分支断板、跌停家数重新增加，
      那就说明昨天的修复只是反抽，不是情绪拐点。"
    interpretation: 弱分歧并非风险本身，关键是分歧过程中核心承接是否保持、亏钱效应是否收敛
