      华为韬定律叠加后，半导体炒作从长鑫存储扩产单点扩散至全产业链（EDA、设备、材料、设计等），
      炒作周期全面延长
    evidence_quote: >
      "突然间叠加了华为韬定律，那么整个半导体的炒作周期就全面扩散了。
      我们之前只看国产替代，那么现在又出了一些新的概念，整个半导体全产业上下游我们都能看到。
      所以我们可以看到华大九天这种票，我们的EDA在之前它是没有动的，因为长鑫的扩产潮跟这个东西没关系，
      所以最近它开始动了。我们整个半导体全产业链都能动了。"
    interpretation: >
      华为韬定律为半导体提供了新的催化剂，使炒作逻辑从"长鑫扩产"单一叙事扩展为"全产业链国产替代+新催化"。
      EDA等 previously 未动的细分方向开始补涨，表明资金正在全面覆盖半导体上下游，
      行情从结构性升级为板块性，持续时间和空间都可能延长。
