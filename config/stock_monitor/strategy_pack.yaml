market_framework:
  current_stage: "双核心分歧修复验证期 + PCB/华为韬定律反包观察"
  core_question: "明日PCB与华为韬定律至少一个能否反包成功，情绪端能否突破3板压制，同时防御方向是否反向虹吸科技资金"
  latest_up_bias:
    source_docs:
      - "sources/raw/财经/早盘动态补发：26-05-26：继续持股.md"
      - "sources/raw/财经/盘中动态补发：26-05-26：准备抄底.md"
      - "sources/raw/财经/午盘补发：26-05-26：利通电子.md"
      - "sources/raw/财经/动态复盘：26-05-26：双核心分歧修复，PCB与韬定律反包观察.md"
    rules:
      - "科技回落属于昨日半导体高位大涨后的正常消化，是韬定律节奏内休整，不按逻辑证伪处理。"
      - "本轮情绪持续运行的双核心收敛为PCB与华为韬定律；其他方向更多是阶段性配角。"
      - "尾盘快速修复提前消耗次日普涨预期，明日弹性未必继续放大，但向下空间也相对有限。"
      - "明日重点看PCB与韬定律至少一个反包成功、连板高度是否突破3板、防御方向是否反向虹吸科技。"
      - "当前组合仓位偏高，观察池不做新增净仓；只允许分歧后确认买点、做T或减弱留强。"
  index_rules:
    - name: "weak_repair_alert"
      index: "上证指数"
      trigger_condition: "close_below"
      threshold: 4080
      severity: "observe"
      action: "指数弱修复观察"
      trigger_template: "收盘跌破{threshold}"
      interpretation: "修复力度不足，降低次日预期，持仓以持有观察为主不新增净仓。"

    - name: "trend_defense_proximity"
      index: "上证指数"
      trigger_condition: "close_below"
      threshold: 4070
      severity: "risk"
      action: "指数趋势防线观察"
      trigger_template: "收盘跌破{threshold}"
      interpretation: "弱修复确认，触发持仓保护观察，核心票跌破分时均价优先T出或减亏。"

intraday_schedule:
  - window: "09:15-09:30"
    name: "集合竞价"
    action_bias: "只观察"
    rules:
      - "观察PCB与华为韬定律前排是否一致高开、是否出现大封单但后排无承接"
      - "观察核心持仓和板块龙头是否超预期高开或低开"
      - "不因单票高开直接追买"
  - window: "09:30-09:45"
    name: "开盘观察"
    action_bias: "确认方向"
    rules:
      - "看PCB或华为韬定律是否至少一个方向主动反包，而不是只有防御方向走强"
      - "看指数是否快速失守关键位，创业板指和科创50比沪指更关键"
      - "看持仓是否低开后快速收回分时均线，弱票不因低开直接摊低"
  - window: "09:45-10:30"
    name: "急跌确认"
    action_bias: "等确认，不水下盲吸"
    rules:
      - "若双核心分歧后核心票不再创新低，并放量收回分时均线，可进入做T观察"
      - "若两个核心均不能反包且防御方向虹吸科技，暂停观察池买入"
      - "只买跌得多且看好的主线核心，不买破位后排和异动压力票"
  - window: "10:30-13:30"
    name: "主修复窗口"
    action_bias: "可做T，可减集中度"
    rules:
      - "趋势未破的硬逻辑票，满足分时确认后可做T"
      - "反弹到成本区或预设减仓区但板块不扩散，优先减仓或减集中度"
      - "仓位偏高时，新增观察池买点必须用弱票减仓资金置换"
  - window: "13:30-15:00"
    name: "午后风险窗口"
    action_bias: "只卖不买"
    rules:
      - "午后冲高无扩散，优先兑现或减亏"
      - "尾盘回落跌破关键位，降低次日预期"
      - "若尾盘再度快速修复但成交不能放大，警惕继续透支次日预期"
      - "强修复持仓跌破分时均价时优先保护利润；弱势持仓反抽不及核心时减弱留强"

agent_analysis_schedule:
  - id: "open_auction"
    time: "09:26"
    name: "集合竞价后"
    focus: "核心持仓和观察池是否超预期高开低开，今天偏进攻还是防守。"

  - id: "open_confirm"
    time: "09:45"
    name: "开盘15分钟确认"
    focus: "指数是否失守关键位，科技/CPO/PCB/半导体谁主动，持仓是否异常。"

  - id: "morning_confirm"
    time: "10:30"
    name: "30分钟确认"
    focus: "是否有底部钝化，修复质量是否成立，能不能做T或减仓。"

  - id: "noon_review"
    time: "11:20"
    name: "上午收盘前"
    focus: "上午定性为强修复、弱修复、防御切换还是继续分歧。"

  - id: "afternoon_risk"
    time: "13:10"
    name: "午后风险窗口"
    focus: "按午后只卖不买纪律，重点观察冲高回落和板块扩散衰竭。"

  - id: "mid_afternoon"
    time: "14:00"
    name: "午盘监控"
    focus: "午后一小时盘面验证：持仓是否触发风控、观察池是否出现分歧低吸点。只讲当下，不预判尾盘，不做次日预案。"

  - id: "tail_condition"
    time: "14:50"
    name: "尾盘条件单"
    focus: "判断是否符合尾盘低吸、减仓、T出或规避尾盘杀的条件。"

position_rules:
  - id: "hard_logic_t_rule"
    name: "硬逻辑票做T确认"
    applies_to: ["core_holding", "hard_logic_holding"]
    all_required:
      - "趋势未破"
      - "主线硬逻辑仍在"
      - "分时放量拐头"
      - "后一个反弹峰超过前一个反弹峰"
    forbidden:
      - "水下盲吸"
      - "放量破位后把弱反抽当反转"

  - id: "reduce_concentration"
    name: "单票集中度降低"
    applies_to: ["core_holding"]
    trigger:
      - "单票市值占持仓超过45%"
      - "反弹到预设减仓区"
      - "板块扩散不足或资金净流出"
      - "退潮尾声强修复中，个股高位盘口卖压明显且跌破分时均价"
    action: "提醒减仓观察或做T降低集中度"

  - id: "weak_repair_reduce"
    name: "弱修复去弱留强"
    applies_to: ["middle_holding", "materials_holding"]
    trigger:
      - "所属板块修复但个股明显弱于板块"
      - "反弹接近减仓区"
      - "资金持续流出"
    action: "提醒反弹调换或降仓"

  - id: "strong_repair_no_chase"
    name: "强修复不追高"
    applies_to: ["strong_repair_holding"]
    trigger:
      - "个股日内强于组合和板块"
      - "已接近预设减亏区"
      - "高位追买盈亏比不足"
      - "板块核心强但持仓个股弱于分时均价，只能等反抽减亏，不能加仓摊低"
    action: "提醒持有观察，接近减亏区可减，不追买"

  - id: "repair_tail_profit_protection"
    name: "退潮尾声强修复保护利润"
    applies_to: ["core_holding", "hard_logic_holding", "advanced_packaging_holding", "materials_holding", "strong_repair_holding"]
    trigger:
      - "持仓涨幅较大但午后跌破分时均价"
      - "盘口卖五明显大于买五，且后一个反弹峰低于前峰"
      - "板块核心从强共振转为冲高回落"
      - "临近周四周五或外部流动性风险窗口"
    forbidden:
      - "把已确认鱼尾行情中的高开高走当作新开仓理由"
      - "弱势持仓跌破分时均价后继续加仓摊低"
    action: "提醒保护利润、T出或减亏处理；若仍强封或高位承接，则只持有观察"

  - id: "mainboard_watch_entry_confirm"
    name: "主板观察池介入确认"
    applies_to:
      - "capacity_core"
      - "elastic_abf_substrate"
      - "pcb_core_extension"
      - "pcb_material_elastic"
      - "pcb_long_option"
      - "mlcc_mainboard_core"
      - "supercapacitor_core"
      - "cpu_xinchuang_pioneer"
      - "advanced_packaging_elastic"
      - "micro_led_chain"
    all_required:
      - "只处理主板股票，创业板/科创/北交不进入可操作观察池"
      - "所属主板板块组强于全A或强于防御组"
      - "个股不是一致高开后的追高点"
      - "分歧后放量收回分时均线，后一个反弹峰超过前一个反弹峰"
      - "同组至少一个容量锚同步承接"
    forbidden:
      - "公告型一字或大幅高开直接追"
      - "板块不共振时只因为单票异动买入"
      - "远期材料或Micro-LED题材未换手就当主线"
    action: "提醒进入主板观察池确认点，但仍需写触发条件、证伪条件和仓位上限"

