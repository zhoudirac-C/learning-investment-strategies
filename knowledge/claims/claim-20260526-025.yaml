  - id: claim-20260526-025-c
    source_path: sources/raw/财经/视频：26-05-26：股市如何抄底.md
    source_date: "2026-05-26"
    source_type: 视频
    extracted_at: "2026-05-27"
    claim_type: methodology
    subject: 抄底的时间与空间法则
    timeframe: permanent
    statement: 抄底时时间和空间只需确定一个：能确定空间就用空间，确定不了空间就确定时间
    evidence_quote: >
      "你在空间和时间上确定一个就好。你如果能确定空间，那么就用空间。
      你如果确定不了空间，那么确定时间。所以我们确定了时间，反弹空间不知道。"
    interpretation: >
      抄底操作的核心方法论：时间和空间是二维约束，但不必强求同时精确。
      时间维度（周期推算、斐波那契数列）相对更容易确定；空间维度（具体点位）往往受情绪和资金影响更大。
      确定时间后，在时间节点附近观察盘面结构（缓跌段+急跌末端）进行左侧或右侧介入。
    confidence: high
    status: active
    supersedes: []
