  claim_type: market-cycle
  subject: 修复性质判断
  timeframe: short-term
  statement: 防御方向（白酒、猪肉、银行）上涨而科技主线不修复，不是真正修复，而是资金从高位撤出后找低位避险。真正的修复需要科技主线龙头主动领涨、板块内个股普涨、成交额回流。
  evidence_quote: "昨日最隐晦的信号是：盘中指数一度出现修复迹象，但资金并没有明显回流前期高位科技主线，而是更多流向猪肉、白酒、食品饮料、银行等防御或低位消费方向。这说明当时市场不是风险偏好重新上攻，而是资金从高位科技撤出后，去找低位防御方向避险。"
  interpretation: 防御切换≠风险偏好转暖，只有科技主线回流才是真正的进攻修复。
  confidence: high
  status: active
