  statement: 劣性轮动的特征是每个方向只能涨一天或半天，资金看到消息就拉、拉完马上兑现，没有持续性，追随难度极高。
  evidence_quote: "所谓劣性轮动，就是每个方向都只能涨一天或半天，资金看到消息就拉，拉完马上兑现，没有持续性。在这种环境下，追随轮动的难度会非常高，因为买点稍微慢一点就容易变成接盘。"
  interpretation: 劣性轮动是震荡市中最危险的状态，需要通过核心方向能否修复来判断轮动质量。
