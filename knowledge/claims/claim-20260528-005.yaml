- id: claim-20260528-005-c
  source_path: sources/raw/财经/早盘：26-05-29：轻指数重个股，AI新分支与利好催化观察.md
  source_date: '2026-05-29'
  source_type: 早盘
  extracted_at: '2026-05-29'
  claim_type: operation
  subject: 拐点次日调整的买入节奏
  timeframe: short-term
  statement: 拐点确认后的次日若出现调整，是右侧买入窗口，而非风险信号；标准节奏是拐点日建仓/加仓，次日分歧日逢低补仓
  evidence_quote: "昨天不是说过了嘛，今天调整就是很好的买点。昨日复盘明确判断'连续杀跌后的情绪共振拐点'，今日若出现调整，即为右侧买入窗口。"
  interpretation: 拐点交易的标准节奏：①拐点日（T日）确认情绪转折，此时建仓或加仓；②次日（T+1日）通常会出现获利回吐或分歧调整，这是逢低补仓的窗口而非风险；③关键前提：拐点判断必须正确（有验证框架支撑），否则调整可能是下跌中继；④与"买阴不买阳"原则一致——在调整时买入，而非在上涨后追高。这是右侧交易的核心节奏。
  confidence: medium
