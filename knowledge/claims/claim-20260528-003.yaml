  source_path: sources/raw/财经/视频：26-05-28：股市技术分析第一课：单根大阳线（长红线）的实战用法与交易纪律.md
  source_date: '2026-05-28'
  source_type: 视频
  extracted_at: '2026-05-28'
  claim_type: operation
  subject: 长红线跌破的风控规则
  timeframe: permanent
  statement: 长红线跌破后建立两道风控防线：跌破中点（开盘+收盘)/2先减仓，跌破开盘价（最低点）无条件清仓
  evidence_quote: "第一道防线是长红线中点，即（开盘价+收盘价）/2，跌破中点先减仓；第二道防线是长红线的开盘价（最低点），跌破最低点无条件清仓。没有纪律的技术分析是赌博，有纪律的技术分析才是交易，哪怕会卖飞也必须遵守，这样才能在市场长期存活。"
  interpretation: 长红线风控的两道防线逻辑：①长红线本身是重要支撑，所有在该线买入者成本都在线内，跌破后全员亏损引发止损抛压；②中点是第一道预警线，跌破说明支撑开始失效，先减仓锁定部分利润；③开盘价是最低点，跌破意味着长红线的支撑完全失效，无条件清仓避免深套；④纪律优先于预测，卖飞是成本，深套是致命风险。
