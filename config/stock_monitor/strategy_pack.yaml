notification_policy:
  only_notify_when:
    - "持仓触发加仓观察、减仓观察、风控降级或集中度处理"
    - "核心观察票触发明确买点或证伪"
    - "大盘或板块状态发生切换"
    - "退潮尾声强修复中，强势持仓跌破分时均价或弱势持仓反抽到减亏区"
  suppress_when:
    - "只是普通红绿波动"
    - "单票异动但板块不共振"
    - "同一股票同一信号30分钟内已提醒"
    - "当前不在A股交易时段"
  message_fields:
    - "time"
    - "action"
    - "stock"
    - "price"
    - "position_context"
    - "trigger"
    - "market_context"
    - "suggested_plan"
    - "invalidation"
    - "next_check"
