    subject: 超级电容方向
    timeframe: industry
    statement: 超级电容是AI供电瓶颈下最值得跟踪的新方向，英伟达GB300到Rubin储能容量拉升20倍，全球LIC龙头武藏年产能仅650万颗，供给缺口显著
    evidence_quote: >
      "超级电容——今天最值得记的方向。AI服务器单柜功耗突破百千瓦门槛后，传统备电架构全面失效。
      英伟达从GB300到Rubin储能容量拉升20倍，2026年GB300 NVL72机架对应超级电容需求1500-1800万个，
      而全球LIC龙头武藏年产能仅650万颗，供给缺口显著。"
    interpretation: >
      超级电容是AI服务器功耗升级后传统备电架构失效的必然替代方向。
      需求端（英伟达GB300/Rubin拉动20倍）与供给端（全球龙头产能严重不足）的剪刀差
      构成典型的"占比小、弹性大"的投资叙事。江海股份涨停、海星股份8天4板验证资金认可。
    confidence: high
