  subject: 早盘三大确认点框架
  timeframe: intraday
  statement: 每日早盘观察三个确认点：高标能否继续晋级、跌停是否维持个位数、有无新利好催化
  evidence_quote: "今日三大确认点：一看高标能否继续晋级、二看跌停是否维持个位数、三看有无新利好催化。"
  interpretation: 早盘观察框架：①高标晋级率反映情绪延续性，高标断板意味着情绪降温；②跌停家数反映恐慌程度，个位数说明情绪底部有支撑；③利好催化决定是否有新方向打开空间，无催化则按缩量整理处理。三个确认点的组合决定当日攻防节奏：三好=积极进攻；两好一差=谨慎参与；一好两差=防守观望。
