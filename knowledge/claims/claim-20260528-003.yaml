  timeframe: permanent
  statement: 单根K线在横盘盘底、反弹阶段作用最大；明显上升趋势持股、明显下跌趋势控仓时不需要重点看单根K线
  evidence_quote: "单根K线在市场处于横盘盘底、反弹阶段作用最大，明显上升趋势持股、明显下跌趋势控仓时，不需要重点看单根K线。"
  interpretation: 单根K线的有效性高度依赖市场环境：①横盘盘底和反弹阶段，多空力量胶着，单根K线的突破或反转信号最有价值；②明显上升趋势中，单根K线的波动是噪音，应持股而非频繁交易；③明显下跌趋势中，单根K线的反弹可能是诱多，应控仓而非抄底。这是"不能手里拿个锤子，看什么都像钉子"的具体体现——工具要在正确场景使用。
