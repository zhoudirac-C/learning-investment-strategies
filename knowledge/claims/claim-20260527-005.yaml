    timeframe: short-term
    statement: 5月27日相对低位的科技分支（边缘计算、功率半导体、模拟芯片）率先强于市场，暗示风格可能向AI"中后期补涨分支"迁移
    evidence_quote: >
      "今天的关键线索是'相对低位的科技分支'率先走强——边缘计算、功率半导体、模拟芯片明显强于市场。
      这暗示了一个重要可能：如果发生风格切换，新技术方向最值得留意。"
    interpretation: >
      市场风格从AI主线龙头向尚未充分炒作的新技术分支迁移的信号：低位科技分支在调整日逆势走强。
      类比新能源中后期钙钛矿/钠电池的补涨逻辑，AI的Agent、具身智能、物理AI、端侧AI等
      尚未大规模炒作的方向有充裕演绎空间。
