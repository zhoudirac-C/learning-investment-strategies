  subject: 上游涨价链的进攻价值
  timeframe: short-term
  statement: 情绪修复初期，上游涨价链（位置更低、扩散更广）是比高位核心更好的进攻方向
  evidence_quote: "光通信/CPO是核心但已在高位、提供的是确认而非空间；上游涨价链（功率半导体、高频变压器、SST、电子布等）位置更低、扩散更广，可能是更好的进攻方向。"
  interpretation: 高位vs低位的取舍逻辑：①高位核心（光通信/CPO）确认产业景气但缺乏情绪空间；②上游涨价链有"涨价"叙事自带基本面锚，能容纳更多资金；③情绪修复初期的最优策略是布局位置更优的扩散分支，而非追高已兑现的高位品种。这是"买阴不买阳"原则在板块选择上的体现。
