notification_policy:
  only_notify_when:
    - "CPU自研链触发明确观察点或证伪"
    - "上游涨价链触发观察点或扩散确认"
    - "大盘4055支撑验证或跌破"
    - "半导体/消费出现规避方向异动"
    - "防御股再演剧本式拉起"
    - "算力租赁/token概念发酵"
  suppress_when:
    - "只是普通红绿波动"
    - "单票异动但板块不共振"
    - "同一股票同一信号30分钟内已提醒"
    - "当前不在A股交易时段"
    - "规避方向（半导体/消费）的普通波动"
  message_fields:
    - "time"
    - "action"
    - "stock"
    - "price"
    - "position_context"
    - "trigger"
    - "market_context"
    - "suggested_plan"
    - "invalidation"
    - "next_check"
