  up_bias: "调整周期未完，多看少动，等缩量、等情绪回暖、等利好落地。开盘三锚点：防御股剧本/跌停缩短/半导体接力。新分支优先：超级电容、功率半导体涨价、算力出海。补充：字节700亿美元AI资本支出利好AIDC；凯恩股份辟谣移除观察。"
  market_summary: "5月27日回踩定性为'等了很久的回踩'，月底切换+微盘止跌+科技补跌=新周期起点。但需2个交易日确认强修复还是弱修复。早盘重点观察：①防御股是否再演剧本（电力/MLCC）；②跌停家数是否边际缩短；③长电/华天封板能力。新方向：超级电容（江海/艾华/海星，凯恩股份辟谣移除）、功率半导体（芯联集成/捷捷微电，英飞凌+TI第二轮涨价）、端侧AI（美格智能）、算力出海+字节AIDC（寒武纪/海光/海鸥股份/可立克/光环新网/奥飞数据）。字节700亿美元AI资本支出是AIDC重大催化。"
  stocks_with_data: []
  stocks_pending_fetch: []
  overall_action: "持仓已清空，现金为主。不主动加仓，等三信号落地。开盘先看防御股是否剧本式拉起，再决定攻防节奏。新分支优先排序：超级电容>功率半导体涨价>算力出海。避免追高已涨防御板块。"

