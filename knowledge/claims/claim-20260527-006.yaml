  subject: 存储芯片穿越博弈的仓位纪律
  timeframe: short-term
  statement: 存储芯片在10点钟是博穿越的合适节点，但仓位必须控制，因为博穿越十有九死，且同一只股票在不同时间点介入风险收益比完全不同
  evidence_quote: 我们今天在10点钟那个节点选择卖出半导体、去减一波存储，但本质上是博穿越的一个形态。博穿越的这种行为，它就不一定会成功。因为我之前跟各位说过，博穿越基本上十有九死...你10点钟去搞一把3个点，你最后哪怕是砸下来了，你亏也亏不到一个点
  interpretation: 博穿越是高风险操作，必须满足两个条件：①大盘没有系统性风险（博主判断4050附近支撑有效）；②仓位必须轻（3个点以内，亏不到1个点）。同时强调时间敏感性：10点钟的位置是好的，但涨起来后再追就是不应该的。
  confidence: medium
