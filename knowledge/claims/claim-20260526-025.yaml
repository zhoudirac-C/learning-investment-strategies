  - id: claim-20260526-025-g
    source_path: sources/raw/财经/视频：26-05-26：股市如何抄底.md
    source_date: "2026-05-26"
    source_type: 视频
    extracted_at: "2026-05-27"
    claim_type: methodology
    subject: 散户仓位管理核心原则
    timeframe: permanent
    statement: 散户赚大钱的核心法则：容易赚钱时重仓，容易亏钱时控仓，实现少亏大赚
    evidence_quote: >
      "散户想要赚钱、赚大钱，那么一定是在容易赚钱的时候去好好赚钱，在容易亏钱的时候，你是需要少亏钱。
      也就是说，你要把仓位进行一个管理。在出现明确的大盘一个信号不好的时候，你要进行一个仓位管理。
      那么在这段下跌的途中，你少亏一点，在上涨的途中，我们把仓位加上去，这样就是少亏大赚。"
    interpretation: >
      散户与机构最大的差异在于资金规模和回撤承受能力。散户不应追求每一笔都赚钱，
      而应追求"顺风时满仓吃足、逆风时轻仓少亏"的盈亏不对称。
      关键在于识别"容易赚钱"和"容易亏钱"的周期：主升期重仓、退潮期轻仓、冰点期试错。
    confidence: high
    status: active
