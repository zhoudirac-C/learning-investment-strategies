  subject: 缩量阶段新分支优先排序
  timeframe: short-term
  statement: 缩量阶段资金从传统主线向新分支迁移，事件催化型新分支（超级电容、功率半导体）位置更低、消耗资金更少，应优先于老主线
  evidence_quote: 昨日已出现资金从传统主线向新分支迁移的迹象——华塑股份接近平盘回封 vs 华天科技、沃格光电封不住，量级悬殊。缩量阶段，事件催化型新分支位置更低、消耗资金更少，应优先排序
  interpretation: 缩量市场的选股原则：①老主线（半导体龙头）封不住板，说明资金承接力下降；②新分支（华塑股份）平盘回封，说明有资金愿意在低位布局；③新分支事件催化硬（涨价、技术升级）、位置低、消耗资金少，更适合缩量环境。
