  subject: 高档长红线的顶部信号
  timeframe: permanent
  statement: 高档长红线是长期温和上涨后突然出现的超常规涨幅长红线，代表最后一批场外资金入场、多方耗尽，是"不见长虹不回头"的顶部信号
  evidence_quote: "长期温和上涨后突然出现远超过日常涨幅的长红线，是最后一批场外看多资金集中入场，多方力量已经耗尽，是阶段性顶部信号。在这个行业当中有一句话就叫做不见长虹不回头说的就是这根光头光脚的长红线。贵州茅台涨到2400元前，出现了带跳空缺口的高档光头长红线，之后再也没有创出新高。"
  interpretation: 高档长红线的识别特征：①前期上涨节奏温和，很少出现大阳线；②突然出现一根涨幅远超日常的长红线（常伴随跳空缺口）；③市场逻辑是"最后一批场外资金集中入场"，所有看多资金已进场后无新增买盘；④不一定立刻下跌，可能再涨5%-10%，但绝不能加仓，需减仓+设止损。茅台2400元阶段顶是经典案例。
