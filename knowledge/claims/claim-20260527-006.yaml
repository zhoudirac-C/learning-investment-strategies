  claim_type: sector-theme
  subject: 半导体退潮节奏：非A杀而是高位震荡
  timeframe: short-term
  statement: 半导体大资金启动的行情不会A杀，调整15%左右基本到位，主力会边打边撤，小市值票涨停是掩护大部队撤退的敢死队行为
  evidence_quote: 这一波行情它是大资金启动的，那么大资金启动，它一定不会像有纯游资炒作的那样...基本调15%就差不多了，基本上结构都是要接的...你主力部队先去干一波，没干过你主力部队就往后撤。你肯定是边打边撤的...小市值一点的这种半导体上去送死的...是为了掩护这种大部队撤退的
  interpretation: 大资金主导的半导体行情与纯游资炒作有本质区别：①调整幅度有限（15% vs 50% A杀）；②退潮方式是高位震荡而非连续跌停；③小票涨停是掩护大部队撤退的信号。长电科技作为容量中军，其走势是判断半导体退潮节奏的核心锚点。
