  subject: 政策利好不等于买入信号
  timeframe: permanent
  statement: 政策发布引发板块涨停时，需区分是主线逻辑还是短期事件驱动，后者追涨风险高
  evidence_quote: "房地产涨停原因，我后面的视频会讲到消费和地产，不要追。"
  interpretation: 操作纪律：①政策利好发布时，先判断是长期产业逻辑还是短期情绪催化；②城市更新规划是长期政策，但对房地产板块的短期刺激属于事件驱动；③"不要追"是因为事件驱动往往一日游或几日游，追高容易被套；④主线方向（AI/半导体）的政策利好才值得持续跟踪。这是区分"真利好"和"假利好"的核心方法。
