- id: claim-20260529-002-c
  source_path: sources/raw/财经/午盘：26-05-29：高低切换剧本，买阴卖阳等共振.md
  source_date: '2026-05-29'
  source_type: 午盘
  extracted_at: '2026-05-29'
  claim_type: sector-theme
  subject: 消费超跌方向的先涨后跌风险
  timeframe: short-term
  statement: 白酒、地产、金融等低位超跌方向是纯低位反弹，暂看不出持续性；一旦消费成为下一周期主线，反而要警惕行情进入尾声
  evidence_quote: 白酒、地产、金融、电力等低位超跌方向相继发力，想从科技分流的资金里抢食，但除电力尚有夏季厄尔尼诺、用电高峰预期作支撑外，其余分支基本是纯低位反弹，暂看不出持续性。一旦消费成为下一周期主线，反而要警惕行情进入尾声。
  interpretation: 消费方向的定性：①电力有基本面支撑（夏季用电高峰+厄尔尼诺），其余（白酒/地产/金融）是纯低位反弹；②"纯低位反弹"=资金避险行为，非基本面驱动；③重要判断：若消费成为下一周期主线，反而要警惕行情进入尾声——因为科技是本轮核心，科技见顶=行情结束，消费接力是行情尾声信号而非新起点。这是博主对"科技见顶、消费见底"观点的明确否定。
