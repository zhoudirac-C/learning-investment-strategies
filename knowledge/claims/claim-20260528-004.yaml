  timeframe: industry
  statement: 字节自研CPU催化CPU配套产业链增量窗口，A股映射两条干净卡位：ST得润(CPU Socket)、万通发展/数渡科技(PCIe Switch)
  evidence_quote: "今天最重要的'新变量'是字节跳动被曝正在自研定制CPU（路透独家）。CPU出货量与Socket是1:1刚性绑定，每一颗自研或外采CPU都必须配一个Socket才能上板。得润是中国大陆唯一通过Intel官方认证、并量产千针级CPU Socket的上市公司。万通发展/数渡科技是'超节点GPU互联'赛道里A股稀缺的体系化进口替代核心标的。"
  interpretation: CPU自研主题的三层逻辑：①产业侧：AI从训练切到推理→CPU消耗跃升→供应短缺/价格飙升→大厂被迫自研；②国内映射：Socket是1:1刚性配套，PCIe Switch是超节点互联核心，两者都是国产替代稀缺环节；③主题价值：可能是科技内部裂变出的新分支候选，有明确催化、清晰配套逻辑、稀缺标的。但ST得润的风险（ST身份、流动性约束）必须单独对待。
