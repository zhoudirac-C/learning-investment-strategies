  claim_type: methodology
  subject: 博主内容定位与边界
  timeframe: permanent
  statement: 博主提供产业逻辑和市场框架分析，不回答个股问题，不推荐个股买卖点，投资者应独立判断
  evidence_quote: "我不回答个股问题，也不推荐个股的买卖点，你可以跟我探讨逻辑，而不是问什么时候买什么时候卖"
  interpretation: 明确的内容边界：①博主专注于产业研究、市场框架和逻辑分析；②不提供具体个股的买入/卖出时点建议；③鼓励探讨逻辑而非寻求操作建议；④投资者需基于自身情况独立决策。这一边界是长期投资关系的基础——提供认知工具，而非替人决策。
  confidence: high
