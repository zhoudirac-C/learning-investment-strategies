- id: claim-20260528-004-c
  source_path: sources/raw/财经/复盘：26-05-28：连续杀跌后的情绪共振拐点.md
  source_date: '2026-05-28'
  source_type: 复盘
  extracted_at: '2026-05-28'
  claim_type: methodology
  subject: 拐点验证的两个关键条件
  timeframe: short-term
  statement: 拐点验证需盯死两个条件：①分歧日全A不破位（破位即失效）；②聚焦度收敛出明确主线（否则只有宽度没有高度）
  evidence_quote: "接下来一两个交易日，盯死两件事，任何一件证伪都要降级处理：验证点1（指数强度底线）：明后天出现分歧时，全A指数必须相对强势、不能破位。一旦破位，行情大概率回归到5月22日那种杀跌场景里去。验证点2（聚焦度）：正常的情绪上升周期都会逐步收敛出一个明显的聚焦方向。如果持续只有轮动、出不来聚焦，那就意味着——有轮动上涨，没有高度空间。"
  interpretation: 拐点验证的框架：①第一道防线是指数结构，破位意味着拐点逻辑作废，回归杀跌剧本；②第二道防线是聚焦度，没有聚焦就没有高度空间，对短线结构不友好；③理想剧本：明天普涨 → 下周一分化 → 主线明确。下周一的分化日是检验聚焦度的关键窗口。
  confidence: high
  status: active
