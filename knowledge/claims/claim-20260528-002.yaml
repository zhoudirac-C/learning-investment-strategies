- id: claim-20260528-002-a
  source_path: sources/raw/财经/动态：26-05-28：情绪回暖符合预期.md
  source_date: '2026-05-28'
  source_type: 动态
  extracted_at: '2026-05-28'
  claim_type: methodology
  subject: 情绪与指数的修复时序关系
  timeframe: trend
  statement: 情绪修复先于指数修复，情绪回暖后指数滞后1-2个交易日确认，这是市场周期中的常见规律
  evidence_quote: "情绪修复，不是大盘修复，昨天视频讲过了，情绪会先于指数修复"
  interpretation: 情绪端（涨跌家数、涨停板数量、跌停板数量）通常领先指数端反应。当情绪率先回暖时，指数可能尚未同步，需要1-2个交易日的滞后确认。这一规律在回踩后的修复阶段尤为明显——情绪先止跌→资金试探性回流→指数最终确认。
  confidence: high
  status: active
