  claim_type: operation
  subject: 情绪拐点日的仓位管理：空仓上5成，满仓降仓
  timeframe: intraday
  statement: 情绪拐点日尾盘横住是好事；空仓者可上5成仓位，满仓者应降仓留操作空间，为明日可能的调整做准备
  evidence_quote: "这会儿横住了是好事...如果你空仓，这个位置可以上点仓位，5成左右...因为外盘还是有风险，所以如果你是满仓，那么应该降点仓位，给自己明天留够操作空间"
  interpretation: 仓位管理的双向建议：①空仓者→上5成（情绪拐点不宜过度悲观，但不满仓因外盘风险）；②满仓者→降仓（外盘风险未释放，需留操作空间）。核心逻辑：今日情绪拐点已现，但尚未经考验；明日若调整=更好确定点，留弹性才能应对。
