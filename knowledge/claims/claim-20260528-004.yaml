  subject: 普涨式轮动的结构性问题
  timeframe: short-term
  statement: 普涨式轮动越全面，越说明缺乏唯一核心主线，这是当前行情最大的结构性缺失
  evidence_quote: "今天科技几乎把自己的所有分支都轮了一遍：从电容/MLCC、培育钻石(金刚石)，到电子布(CCL)、磷化铟、薄膜铌酸锂，再到CPO、PCB、半导体制造。问题恰恰在这里——轮动越全面，越说明缺乏唯一核心。没有绝对主线龙头，是当前行情最大的结构性缺失。"
  interpretation: 普涨轮动的两面性：①积极面是情绪回暖、资金活跃；②消极面是缺乏聚焦方向，难以形成高度和梯队；③对趋势行情（月线）没问题，但对短线接力结构不友好；④后续必须收敛出聚焦主线，否则只有宽度没有高度。这是"无核心"脆弱点的核心体现。
  confidence: high
  status: active
