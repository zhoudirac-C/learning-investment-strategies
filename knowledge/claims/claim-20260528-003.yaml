  claim_type: technical-signal
  subject: 长红线（大阳线）定义与涨幅分级
  timeframe: permanent
  statement: 长红线核心特征为开盘接近最低价、收盘接近最高价，实体涨幅明显；指数涨幅1%/3%/5%分别对应明显/强势/历史级长红线，个股涨幅要求更高
  evidence_quote: "长红线核心特征为开盘价接近当日最低价、收盘价接近当日最高价，实体涨幅明显，允许少量影线，不需要追求形态完美。对指数来说，涨幅1%以上是明显长红线，3%以上是强势长红线，5%以上是历史级长红线；对个股来说，指数1.5%涨幅对应个股3%-5%，指数5%对应个股批量涨停。"
  interpretation: 长红线的判定标准：①形态上不要求完美光头光脚，允许少量影线，核心看开盘接近最低、收盘接近最高；②涨幅分级因标的类型而异，指数和个股的敏感度不同，个股的涨幅要求比指数高1.5到2倍；③这种分级帮助交易者区分"普通阳线"和"具有信号意义的长红线"。
