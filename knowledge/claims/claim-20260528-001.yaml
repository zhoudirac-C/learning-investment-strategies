  subject: 5月27日回踩定性：非破位
  timeframe: short-term
  statement: 5月27日属回踩而非破位，沪指未破5.21低点+尾盘未加速下杀+午后轮动至农业，距4000点支撑可信，参考2月初回调
  evidence_quote: 调整周期未完，但昨日属'回踩'而非'破位'——沪指未破5.21低点 + 尾盘未加速下杀 + 午后已轮动至农业，三条线索共同指向：距4000点关口已近，参考2月初回调，该位置支撑可信
  interpretation: 回踩与破位的区别在于：①是否创阶段新低（5.21低点未破）；②尾盘是否加速（未加速说明恐慌盘有限）；③是否有资金轮动（农业轮动说明资金仍在寻找机会而非全面撤退）。4000点作为2月初强支撑，在此位置获得支撑的概率较高。
