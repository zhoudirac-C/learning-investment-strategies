market_framework:
  current_stage: "月底切换观察期 + 新技术分支优先排序期"
  core_question: "强修复还是弱修复？需2个交易日确认。开盘三锚点：防御股剧本/跌停缩短/半导体接力。新分支优先：超级电容>功率半导体涨价>算力出海。"
  latest_up_bias:
    source_docs:
      - "sources/raw/财经/复盘：26-05-27：等了很久的回踩，月底切换与新技术分支.md"
      - "sources/raw/财经/视频：26-05-27：半导体卖出时点、存储穿越博弈与周期节奏.md"
      - "sources/raw/财经/早盘：26-05-28：调整周期未完，防御股剧本与半导体接力观察.md"
    rules:
      - "5月27日回踩定性为'等了很久的回踩'，月底切换+微盘止跌+科技补跌=新周期起点。"
      - "但需2个交易日确认强修复还是弱修复，前两天的耐心比动作更值钱。"
      - "开盘三锚点：防御股是否再演剧本、跌停家数是否边际缩短、半导体龙头封板能力。"
      - "新方向优先级：超级电容（GB300机柜级标配）、功率半导体（英飞凌+TI第二轮涨价）、算力出海+国内基建。"
      - "缩量阶段，事件催化型新分支位置更低、消耗资金更少，应优先排序。"
      - "不主动加仓，等三信号（缩量、情绪、利好）落地。"
      - "避免追高已涨防御板块。"
  index_rules:
    - name: "weak_repair_alert"
      index: "上证指数"
      trigger_condition: "close_below"
      threshold: 4080
      severity: "observe"
      action: "指数弱修复观察"
      trigger_template: "收盘跌破{threshold}"
      interpretation: "修复力度不足，降低次日预期，持仓以持有观察为主不新增净仓。"

    - name: "trend_defense_proximity"
      index: "上证指数"
      trigger_condition: "close_below"
      threshold: 4070
      severity: "risk"
      action: "指数趋势防线观察"
      trigger_template: "收盘跌破{threshold}"
      interpretation: "弱修复确认，触发持仓保护观察，核心票跌破分时均价优先T出或减亏。"

    - name: "4000_support"
      index: "上证指数"
      trigger_condition: "close_below"
      threshold: 4000
      severity: "risk"
      action: "4000点支撑跌破"
      trigger_template: "收盘跌破{threshold}"
      interpretation: "4000点强支撑跌破，调整加深，需重新评估底部位置。"

intraday_schedule:
  - window: "09:15-09:30"
    name: "集合竞价"
    action_bias: "只观察"
    rules:
      - "观察防御股（电力/MLCC）是否再演剧本式高开"
      - "观察核心观察票（江海/艾华/美格/芯联）是否超预期高开或低开"
      - "观察跌停家数是否边际缩短"
      - "不因单票高开直接追买"
  - window: "09:30-09:45"
    name: "开盘观察"
    action_bias: "确认方向"
    rules:
      - "看防御股是否被剧本式拉起，决定日内风格偏进攻还是防守"
      - "看半导体龙头（长电/华天）封板能力"
      - "看新分支（超级电容/功率半导体）是否主动走强"
      - "看指数是否快速失守关键位"
  - window: "09:45-10:30"
    name: "急跌确认"
    action_bias: "等确认，不水下盲吸"
    rules:
      - "若新分支分歧后核心票不再创新低，并放量收回分时均线，可进入观察"
      - "若防御方向虹吸科技，暂停观察池买入"
      - "只买跌得多且看好的新分支核心，不买破位后排"
  - window: "10:30-13:30"
    name: "主修复窗口"
    action_bias: "可做T，可观察"
    rules:
      - "趋势未破的新分支硬逻辑票，满足分时确认后可观察"
      - "反弹到预设区但板块不扩散，优先观察不介入"
      - "现金为主，新增观察池买点必须等情景确认"
  - window: "13:30-15:00"
    name: "午后风险窗口"
    action_bias: "只看不买"
    rules:
      - "午后冲高无扩散，优先观察不介入"
      - "尾盘回落跌破关键位，降低次日预期"
      - "若尾盘再度快速修复但成交不能放大，警惕继续透支次日预期"

agent_analysis_schedule:
  - id: "open_auction"
    time: "09:26"
    name: "集合竞价后"
    focus: "防御股是否剧本式拉起，新分支（超级电容/功率半导体）是否超预期，今天偏进攻还是防守。"

  - id: "open_confirm"
    time: "09:45"
    name: "开盘15分钟确认"
    focus: "指数是否失守关键位，新分支谁主动，半导体龙头封板能力，跌停是否缩短。"

  - id: "morning_confirm"
    time: "10:30"
    name: "30分钟确认"
    focus: "是否有底部钝化，修复质量是否成立，新分支能否做T或观察。"

  - id: "noon_review"
    time: "11:20"
    name: "上午收盘前"
    focus: "上午定性为强修复、弱修复、防御切换还是继续分歧。"

  - id: "afternoon_risk"
    time: "13:10"
    name: "午后风险窗口"
    focus: "按午后只看不买纪律，重点观察冲高回落和板块扩散衰竭。"

  - id: "mid_afternoon"
    time: "14:00"
    name: "午盘监控"
    focus: "午后一小时盘面验证：新分支是否触发观察点、是否出现分歧低吸点。只讲当下，不预判尾盘。"

  - id: "tail_condition"
    time: "14:50"
    name: "尾盘条件单"
    focus: "判断是否符合尾盘观察、规避尾盘杀的条件。"

position_rules:
  - id: "empty_position_discipline"
    name: "空仓纪律"
    applies_to: ["all"]
    all_required:
      - "持仓已清空，现金为主"
      - "不主动加仓，等三信号落地"
      - "月底切换窗口期，需2个交易日确认情景"
    forbidden:
      - "情景未明时建新仓"
      - "追高潮"
      - "抢一字"
      - "防御板块追高"

  - id: "new_branch_entry_confirm"
    name: "新分支介入确认"
    applies_to:
      - "supercapacitor_core"
      - "supercapacitor_elastic"
      - "edge_ai_core"
      - "power_semiconductor_core"
      - "power_semiconductor_elastic"
    all_required:
      - "所属新分支组强于全A或强于防御组"
      - "个股不是一致高开后的追高点"
      - "分歧后放量收回分时均线，后一个反弹峰超过前一个反弹峰"
      - "同组至少一个容量锚同步承接"
      - "2个交易日情景确认后"
    forbidden:
      - "发酵日追高"
      - "单票异动但板块不共振"
      - "情景未明时介入"
    action: "提醒进入观察池确认点，但仍需写触发条件、证伪条件和仓位上限"

  - id: "legacy_semiconductor_watch"
    name: "老主线观察纪律"
    applies_to: ["capacity_anchor", "packaging_elastic"]
    all_required:
      - "调整周期走完（4~6天）"
      - "出现真正的领涨矛"
      - "板块由容量票带队"
    forbidden:
      - "调整周期内抄底"
      - "封单小的龙头追高"
      - "无合力拉升时介入"
    action: "只观察不介入，等调整周期走完后再评估"

