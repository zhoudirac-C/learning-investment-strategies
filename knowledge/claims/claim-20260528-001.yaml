  subject: 开盘三个锚点判断日内风格
  timeframe: intraday
  statement: 判断日内风格需观察三个锚点：①防御股是否再演剧本（电力/MLCC提前走强）；②跌停家数是否边际缩短；③半导体龙头（长电/华天）封板能力
  evidence_quote: 锚点一：防御股是否再演'剧本'...电力（连日止跌）、MLCC（抵抗性强）能否提前走强，是判断今日风格的第一信号。锚点二：跌停家数边际变化...今日开盘半小时跌停队列若明显缩短，才是真回暖的起点。锚点三：半导体接力...长电科技、华天科技今日能否超预期——封不住就大概率还要调几天
  interpretation: 三个锚点构成开盘观察框架：①防御股走强=资金偏谨慎，风格偏防守；②跌停缩短=情绪回暖，可操作窗口打开；③半导体龙头封板=主线接力成功，科技风格延续。三个锚点的组合决定当日攻防节奏。
