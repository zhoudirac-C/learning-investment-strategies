  subject: 活口分类方法论
  timeframe: permanent
  statement: 分歧初期的活口应分为退潮活口和复苏活口。退潮活口是分歧初期暂时没跌但很难逆势太久，后续容易补跌；复苏活口是充分分歧后率先走强，具备下一轮行情承接意义。
  evidence_quote: "活口分两类：退潮活口——分歧初期暂时没跌，但很难逆势太久；复苏活口——充分分歧后率先走强，具备下一轮行情承接意义。分歧初期如果要买，核心不是追逆势强，而是买波动性价比。真正值得关注的逆势强品种，需要等充分分歧之后再确认。"
  interpretation: 分歧初期不能把暂时没跌的票当成强势，需要区分两类活口。退潮活口容易补跌，复苏活口才是下一轮行情的主力。光模块是退潮活口的典型例子。
