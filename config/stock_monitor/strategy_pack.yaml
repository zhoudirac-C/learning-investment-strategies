      - "cpu_self_development"
      - "upstream_price_increase"
      - "liquid_cooling"
    defensive_groups:
      - "defensive_stabilizers"
    min_spread_pct: 1.0
    min_red_ratio_spread: 0.25

  - id: "price_increase_vs_cpo"
    name: "上游涨价链 vs 光通信CPO"
    offensive_groups:
      - "upstream_price_increase"
      - "liquid_cooling"
    defensive_groups:
      - "cpo_optical"
    min_spread_pct: 1.0
    min_red_ratio_spread: 0.2

  - id: "tech_internal_rotation"
    name: "科技内部分化：CPU/涨价链 vs 半导体"
    offensive_groups:
      - "cpu_self_development"
      - "upstream_price_increase"
    defensive_groups:
      - "avoid_semiconductor"
    min_spread_pct: 1.5
    min_red_ratio_spread: 0.3

  - id: "compute_rental_vs_defense"
    name: "算力租赁 vs 防御"
