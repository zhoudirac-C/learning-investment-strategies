  extracted_at: '2026-05-28'
  claim_type: operation
  subject: 为什么不能抄底：外盘风险与结构问题
  timeframe: intraday
  statement: 5月27日不能抄底的原因：①外盘有风险（美股可能高开低走）；②两点钟拉升缺乏合力（半导体/光模块/PCB/防御都在拉，没有明确带头品种）；③华天科技封单量小，起不到带头作用
  evidence_quote: 今天外盘是有那么一些风险的。如果今天晚上美股...高开低走，那就要出现问题了...半导体在拉，光模块也在拉，PCB也在拉，IP这边各种乱七八糟的东西他都在拉，防御板块这边他也在动。你资金形成不了一个合力...只有一个华天科技，他在那边摸一个涨停，但这个封单量非常的小
  interpretation: 抄底需要满足三个条件：①外盘环境配合（昨天美股关门有利好缓冲，今天无）；②拉升有合力（昨天长电科技带头涨停，今天多板块混战无龙头）；③龙头封板坚决（华天科技封单小，起不到锚定作用）。三个条件都不满足，所以看戏不抄底。
