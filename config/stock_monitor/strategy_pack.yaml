market_framework:
  current_stage: "退潮尾声强修复验证期 + Rubin BOM鱼尾防追高"
  core_question: "今天的科技修复能否由PCB/MLCC/先进封装/国产算力共同承接，并避免高开后冲高回落"
  latest_up_bias:
    source_docs:
      - "sources/raw/财经/动态：26-05-24：缩量修复超预期，Rubin BOM扩散与退潮尾声.md"
      - "sources/raw/财经/视频：26-05-24：周复盘，美债收益率上行、6月回调与AI硬件黄金坑.md"
      - "sources/raw/财经/2026-05-25-早盘-指数反弹与AI硬件国产算力.md"
    rules:
      - "当前修复更接近退潮尾声回暖，不直接定义为新周期。"
      - "PCB/MLCC周末充分发酵后按鱼尾行情处理，已持仓看承接，没先手不追高。"
      - "周一周二可持有强势核心观察，周四周五提高保护利润和降仓优先级。"
      - "指数高开后若成交量不跟或核心主线冲高回落，优先处理弱势和高位卖压持仓。"
  index_rules:
    - name: "short_repair_observation"
      index: "上证指数"
      watch_level: 4100
      valid_close_level: 4080
      weak_close_level: 4070
      trend_defense: 4027
      interpretation: "收在4080以上修复有效；4070以下修复力度不足；4027是趋势防守区。"

intraday_schedule:
  - window: "09:15-09:30"
    name: "集合竞价"
    action_bias: "只观察"
    rules:
      - "观察核心持仓和板块龙头是否超预期高开或低开"
      - "不因单票高开直接追买"
  - window: "09:30-09:45"
    name: "开盘观察"
    action_bias: "确认方向"
    rules:
      - "看指数是否快速失守关键位"
      - "看持仓是否低开后快速收回分时均线"
  - window: "09:45-10:30"
    name: "急跌确认"
    action_bias: "等确认，不水下盲吸"
    rules:
      - "若30分钟底部钝化保留且核心票不再创新低，可进入做T观察"
      - "若放量下跌且钝化消失，暂停买入"
  - window: "10:30-13:30"
    name: "主修复窗口"
    action_bias: "可做T，可减集中度"
    rules:
      - "趋势未破的硬逻辑票，满足分时确认后可做T"
      - "反弹到成本区但板块不扩散，优先减仓或减集中度"
  - window: "13:30-15:00"
    name: "午后风险窗口"
    action_bias: "只卖不买"
    rules:
      - "午后冲高无扩散，优先兑现或减亏"
      - "尾盘回落跌破关键位，降低次日预期"
      - "按UP 5月25日早盘观点，今日需特别防高开后的冲高回落；强修复持仓跌破分时均价时优先保护利润"

agent_analysis_schedule:
  - id: "open_auction"
    time: "09:26"
    name: "集合竞价后"
    focus: "核心持仓和观察池是否超预期高开低开，今天偏进攻还是防守。"

  - id: "open_confirm"
    time: "09:45"
    name: "开盘15分钟确认"
    focus: "指数是否失守关键位，科技/CPO/PCB/半导体谁主动，持仓是否异常。"

  - id: "morning_confirm"
    time: "10:30"
    name: "30分钟确认"
    focus: "是否有底部钝化，修复质量是否成立，能不能做T或减仓。"

  - id: "noon_review"
    time: "11:20"
    name: "上午收盘前"
    focus: "上午定性为强修复、弱修复、防御切换还是继续分歧。"

  - id: "afternoon_risk"
    time: "13:10"
    name: "午后风险窗口"
    focus: "按午后只卖不买纪律，重点观察冲高回落和板块扩散衰竭。"

  - id: "mid_afternoon"
    time: "14:00"
    name: "午盘监控"
    focus: "午后一小时盘面验证：持仓是否触发风控、观察池是否出现分歧低吸点。只讲当下，不预判尾盘，不做次日预案。"

  - id: "tail_condition"
    time: "14:50"
    name: "尾盘条件单"
    focus: "判断是否符合尾盘低吸、减仓、T出或规避尾盘杀的条件。"

position_rules:
  - id: "hard_logic_t_rule"
    name: "硬逻辑票做T确认"
    applies_to: ["core_holding", "hard_logic_holding"]
    all_required:
      - "趋势未破"
      - "主线硬逻辑仍在"
      - "分时放量拐头"
      - "后一个反弹峰超过前一个反弹峰"
    forbidden:
      - "水下盲吸"
      - "放量破位后把弱反抽当反转"

  - id: "reduce_concentration"
    name: "单票集中度降低"
    applies_to: ["core_holding"]
    trigger:
      - "单票市值占持仓超过45%"
      - "反弹到预设减仓区"
      - "板块扩散不足或资金净流出"
      - "退潮尾声强修复中，个股高位盘口卖压明显且跌破分时均价"
    action: "提醒减仓观察或做T降低集中度"

  - id: "weak_repair_reduce"
    name: "弱修复去弱留强"
    applies_to: ["middle_holding", "materials_holding"]
    trigger:
      - "所属板块修复但个股明显弱于板块"
      - "反弹接近减仓区"
      - "资金持续流出"
    action: "提醒反弹调换或降仓"

  - id: "strong_repair_no_chase"
    name: "强修复不追高"
    applies_to: ["strong_repair_holding"]
    trigger:
      - "个股日内强于组合和板块"
      - "已接近预设减亏区"
      - "高位追买盈亏比不足"
      - "板块核心强但持仓个股弱于分时均价，只能等反抽减亏，不能加仓摊低"
    action: "提醒持有观察，接近减亏区可减，不追买"

  - id: "repair_tail_profit_protection"
    name: "退潮尾声强修复保护利润"
    applies_to: ["core_holding", "hard_logic_holding", "advanced_packaging_holding", "materials_holding", "strong_repair_holding"]
    trigger:
      - "持仓涨幅较大但午后跌破分时均价"
      - "盘口卖五明显大于买五，且后一个反弹峰低于前峰"
      - "板块核心从强共振转为冲高回落"
      - "临近周四周五或外部流动性风险窗口"
    forbidden:
      - "把已确认鱼尾行情中的高开高走当作新开仓理由"
      - "弱势持仓跌破分时均价后继续加仓摊低"
    action: "提醒保护利润、T出或减亏处理；若仍强封或高位承接，则只持有观察"

  - id: "mainboard_watch_entry_confirm"
    name: "主板观察池介入确认"
    applies_to:
      - "capacity_core"
      - "elastic_abf_substrate"
      - "pcb_core_extension"
      - "pcb_material_elastic"
      - "pcb_long_option"
      - "mlcc_mainboard_core"
      - "supercapacitor_core"
      - "cpu_xinchuang_pioneer"
      - "advanced_packaging_elastic"
      - "micro_led_chain"
    all_required:
      - "只处理主板股票，创业板/科创/北交不进入可操作观察池"
      - "所属主板板块组强于全A或强于防御组"
      - "个股不是一致高开后的追高点"
      - "分歧后放量收回分时均线，后一个反弹峰超过前一个反弹峰"
      - "同组至少一个容量锚同步承接"
    forbidden:
      - "公告型一字或大幅高开直接追"
      - "板块不共振时只因为单票异动买入"
      - "远期材料或Micro-LED题材未换手就当主线"
    action: "提醒进入主板观察池确认点，但仍需写触发条件、证伪条件和仓位上限"

