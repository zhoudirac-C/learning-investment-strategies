- id: claim-20260528-002-c
  source_path: sources/raw/财经/动态：26-05-28：情绪回暖符合预期.md
  source_date: '2026-05-28'
  source_type: 动态
  extracted_at: '2026-05-28'
  claim_type: operation
  subject: 买阴不买阳的操作策略
  timeframe: short-term
  statement: 当前行情适合采用"买阴不买阳"策略，在科技板块调整时寻找低吸机会，修复日不追高
  evidence_quote: "最近的行情还是基于买阴不买阳寻找科技板块"
  interpretation: "买阴不买阳"是当前轮动行情的核心操作原则：①科技板块调整时（阴线）是布局窗口，因为资金仍在科技内部轮动；②修复日（阳线）不追高，避免追在日内高点；③这一策略适用于无明显主线、分支轮动的市场环境。与5/27复盘"不追高潮、不抢一字"的纪律一致。
  confidence: medium
  status: active
