    subject: 强修复与弱修复的情景推演
    timeframe: short-term
    statement: 5月28日修复分两种情景：强修复共振（积极参与）vs 弱修复（降低仓位等待），判断需2个交易日，核心是观察强势板块能否反包+微盘股能否延续企稳
    evidence_quote: >
      "正常预期明天是有修复的，但分两种情况：情景一：强修复共振...情景二：弱修复...
      判断这两种情景需要2个交易日左右。这两天的核心任务是观察主线和风格的变化，
      而不是急于重仓——前两天的耐心比前两天的动作更值钱。"
    interpretation: >
      周期切换初期不宜急于重仓，需用2个交易日观察：①强势板块（超级电容/端侧AI/散热等）
      能否反包延续；②微盘股能否持续企稳；③是否出现真正进攻性强的"领涨矛"。
      强修复则跟进，弱修复则继续等待。
    confidence: high
