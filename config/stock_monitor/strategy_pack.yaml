sector_rotation_rules:
  - id: "cpu_vs_defense"
    name: "CPU自研链 vs 防御"
    offensive_groups:
      - "cpu_self_development"
      - "upstream_price_increase"
      - "liquid_cooling"
    defensive_groups:
      - "defensive_stabilizers"
    min_spread_pct: 1.0
    min_red_ratio_spread: 0.25

  - id: "price_increase_vs_cpo"
    name: "上游涨价链 vs 光通信CPO"
    offensive_groups:
      - "upstream_price_increase"
      - "liquid_cooling"
    defensive_groups:
      - "cpo_optical"
    min_spread_pct: 1.0
    min_red_ratio_spread: 0.2

  - id: "tech_internal_rotation"
    name: "科技内部分化：CPU/涨价链 vs 半导体"
    offensive_groups:
      - "cpu_self_development"
      - "upstream_price_increase"
    defensive_groups:
      - "avoid_semiconductor"
    min_spread_pct: 1.5
    min_red_ratio_spread: 0.3

  - id: "power_supply_vs_cpo"
    name: "AI供电链 vs 光通信CPO"
    offensive_groups:
      - "power_supply_chain"
      - "upstream_price_increase"
    defensive_groups:
      - "cpo_optical"
    min_spread_pct: 1.0
    min_red_ratio_spread: 0.2

  - id: "compute_rental_vs_defense"
    name: "算力租赁 vs 防御"
    offensive_groups:
      - "compute_rental"
    defensive_groups:
      - "defensive_stabilizers"
    min_spread_pct: 1.0
    min_red_ratio_spread: 0.2

notification_policy:
  only_notify_when:
    - "液冷/散热触发买入点或证伪"
    - "上游涨价链触发观察点或扩散确认"
    - "AI供电链（超级电容/纳米晶/SST）组内联动或分化"
    - "CPU自研链组内联动恢复或持续分化"
    - "大盘4055支撑验证或跌破"
    - "半导体/消费出现规避方向异动"
    - "算力租赁/token概念发酵"
  suppress_when:
    - "只是普通红绿波动"
    - "单票异动但板块不共振"
    - "同一股票同一信号30分钟内已提醒"
    - "当前不在A股交易时段"
    - "规避方向（半导体/消费）的普通波动"
  message_fields:
    - "time"
    - "action"
    - "stock"
    - "price"
    - "position_context"
    - "trigger"
    - "market_context"
    - "suggested_plan"
    - "invalidation"
    - "next_check"
