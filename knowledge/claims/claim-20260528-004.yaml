  subject: 拐点有效性的概率本质
  timeframe: short-term
  statement: 拐点是概率判断而非确定性确认，有效性高度依赖外部环境，破位即失效
  evidence_quote: "拐点的有效性高度依赖外部环境。这根阳线是在美伊冲突下完成的，所以'新周期起点'是概率判断。如果外部冲突升级超预期，或全A在分歧时破位，拐点逻辑随时作废——不要把概率当确定性。"
  interpretation: 概率思维在拐点判断中的应用：①任何拐点判断都有有效期和条件边界；②外部冲击（美伊冲突）可能强化或证伪拐点逻辑；③关键操作原则：按拐点布局但不按拐点押注，保持仓位弹性；④一旦证伪条件触发（破位/外部升级），立即降级处理，不执念于原有判断。这是"有纪律"的核心体现。
