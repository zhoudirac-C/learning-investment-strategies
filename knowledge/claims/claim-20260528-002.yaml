- id: claim-20260528-002-b
  source_path: sources/raw/财经/动态：26-05-28：情绪回暖符合预期.md
  source_date: '2026-05-28'
  source_type: 动态
  extracted_at: '2026-05-28'
  claim_type: sector-theme
  subject: 消费/防御板块的过渡性质
  timeframe: short-term
  statement: 消费和防御板块（如白酒）在调整期间的崛起只是过渡性避险，不构成系统性主线切换，资金很快回流科技
  evidence_quote: "昨天的白酒消费今天开始回调，所以最近的行情还是基于买阴不买阳寻找科技板块"
  interpretation: 5/27午后消费（白酒）崛起，但5/28即开始回调，验证了其过渡性质。全市场都在跌时热钱选择超跌方向做短线博弈，但市场认可度不高。真正的主线仍在科技内部，消费只是短期避险的过渡性选择。这与5/27复盘判断"消费午后崛起大概率只是过渡"一致。
  confidence: high
  status: active
  supersedes: []
