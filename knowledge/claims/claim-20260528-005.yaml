  claim_type: market-cycle
  subject: 炒新题材+炒小个股的资金风格
  timeframe: short-term
  statement: 当前资金风格明显向小盘+新题材倾斜，涨停个股几乎都在几百亿市值及以下，新细分逻辑（如MLCC树脂）容易被挖掘并快速涨停
  evidence_quote: "当前个股选择有明显向小盘发展的趋势，昨日华塑股份回封后直接秒板，而华虹公司这类千亿市值个股封板已不再像之前那么容易，昨日涨停个股几乎都是几百亿市值及以下。后续除非指数放量反弹，否则'炒新（题材）+炒小（个股）'的趋势大概率延续。"
  interpretation: 资金风格切换的信号：①大盘蓝筹封板困难（华虹公司千亿市值涨停不易）；②小盘股容易被推上涨停（华塑股份秒板）；③新细分逻辑（皖维高新被挖MLCC树脂）一旦被发现就快速涨停；④这种风格在缩量+轮动环境中更易延续，因为小盘消耗资金少、弹性大。操作 implication：选股应偏向小市值+新题材，回避已充分博弈的大盘核心。
