      - "offensive_tech"
      - "cpo_light_communication"
      - "semiconductor_core"
      - "pcb_ccl"
    defensive_groups:
      - "defensive_stabilizers"
    min_spread_pct: 1.0
    min_red_ratio_spread: 0.25

  - id: "mainboard_buyable_tech_vs_defense"
    offensive_groups:
      - "mainboard_rubin_pcb_abf"
      - "mainboard_mlcc_power"
      - "mainboard_compute_software"
      - "mainboard_advanced_packaging"
      - "mainboard_micro_led_optics"
