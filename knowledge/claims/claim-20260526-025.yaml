  - id: claim-20260526-025-b
    source_path: sources/raw/财经/视频：26-05-26：股市如何抄底.md
    source_date: "2026-05-26"
    source_type: 视频
    extracted_at: "2026-05-27"
    claim_type: technical-signal
    subject: 5分钟级别顶部形态与时间周期推算
    timeframe: intraday
    statement: >
      5分钟级别出现两个顶部形态（双顶/M头）叠加时，理论调整周期约2小时。
      5月26日开盘4136.99为第一个顶，10:05反弹4137.20为第二个顶，14:05左右到达推断的抄底时间点
    evidence_quote: >
      "今天开得比较弱，导致直接开盘就来了一个5分钟级别的顶部形态。那么随后又来了一个5分钟级别的顶部形态。
      那么他们加在一起调整的对应周期就是两个小时左右。所以我们在下午2:05的那个时间节点，
      就是通过小级别的周期推断出来的。"
    interpretation: >
      5分钟级别的K线形态（双顶）结合MACD顶背离（价格创新高4137.20但MACD未创新高），
      两个顶部形态叠加的理论调整周期约2小时。实际走势中10:05至14:05的调整约4小时，
      14:05后V型反弹验证时间点判断。小级别周期推算需叠加情绪判断才能更精准。
    confidence: high
    status: active
