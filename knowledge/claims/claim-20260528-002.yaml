- id: claim-20260528-002-d
  source_path: sources/raw/财经/动态：26-05-28：情绪回暖符合预期.md
  source_date: '2026-05-28'
  source_type: 动态
  extracted_at: '2026-05-28'
  claim_type: methodology
  subject: 行情不好时研究重于交易
  timeframe: permanent
  statement: 大行情不好时应减少交易频率，将精力投入产业研究和资料整理，为后续行情储备认知
  evidence_quote: "大周期还是不好...最近大行情不好，不用着急交易。从去年到现在，动态里面有大量有价值的产业研究和机构研报，刚充点就花点时间花点功夫去收集整理一下"
  interpretation: 博主明确建议：①大周期不好时降低交易频率，减少犯错概率；②利用低谷期研究产业逻辑、整理研报资料；③认知储备比短期交易更重要，为后续行情做好充分准备。这是一种"春耕秋收"的长期投资方法论——行情不好时播种认知，行情好转时收获交易。
  confidence: high
  status: active
