- id: claim-20260529-002-d
  source_path: sources/raw/财经/午盘：26-05-29：高低切换剧本，买阴卖阳等共振.md
  source_date: '2026-05-29'
  source_type: 午盘
  extracted_at: '2026-05-29'
  claim_type: operation
  subject: 买阴卖阳策略与低吸做T
  timeframe: intraday
  statement: 市场难度增大时应谨慎追高，采用买阴卖阳策略；大盘止跌企稳位置低吸一波，涨起来再出掉，是很好的做T节点
  evidence_quote: 今天是一个很好的做T节点，昨天尾盘也说了，留资金，跟随大盘做T。大盘止跌企稳的位置低吸一波，后面涨起来再出掉。一是市场难度增大，谨慎追高，买阴卖阳或能喝点汤。
  interpretation: 操作策略的两层含义：①买阴卖阳=调整时买入、上涨时卖出，不追高；②做T节点=大盘止跌企稳位置低吸，涨起来出掉，日内或短线做T；③前提条件：留资金（有现金弹性）、跟随大盘（与指数共振方向）、止跌企稳（有明确技术信号）。这是情绪修复期+轮动格局下的核心操作策略。
