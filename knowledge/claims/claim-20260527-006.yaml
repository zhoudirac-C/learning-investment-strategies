  extracted_at: '2026-05-28'
  claim_type: operation
  subject: 利润垫与仓位管理：中长线不是躺平
  timeframe: trend
  statement: 中长线持股必须持续观察，利用利润垫动态调整仓位（如赚20%砍半仓），而非买入后躺平不管。忘掉账户是极不负责任的做法
  evidence_quote: 你炒股一定要去看利润垫，以及第二节课一定要去看利润点。你在有利润垫的情况下，你可以选择去把仓位降低...你放在那里，你忘掉账户，你过几年你再能看，这是一个非常不负责任的办法...股市它绝对不是一个很容易就能够赚到钱的市场，你是要通过学习，通过训练才能够有着稳定的收益
  interpretation: 中长线≠躺平。正确的做法是：①建立利润垫（如20%盈利）；②利用利润垫动态降仓（砍半仓后利润垫增厚，扛波动能力增强）；③持续跟踪而非忘掉账户。这是区分专业投资者和赌徒的关键纪律。
  confidence: high
